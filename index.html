<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการลิงก์สั้นหน่วยงาน</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; background-color: #f8fafc; color: #1e293b; }
        .header-container { border-bottom: 3px solid #3b82f6; padding-bottom: 15px; margin-bottom: 25px; }
        h1 { margin: 0; color: #1e3a8a; font-size: 28px; }
        
        /* สไตล์หน้าฟอร์ม Webapp ใหม่ */
        .form-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; border: 1px solid #e2e8f0; }
        .form-group { display: flex; gap: 12px; margin-top: 10px; }
        input { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; outline: none; transition: 0.2s; }
        input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .btn-submit { background-color: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .btn-submit:hover { background-color: #1d4ed8; }
        .btn-submit:disabled { background-color: #cbd5e1; color: #94a3b8; cursor: not-allowed; }
        #statusMsg { font-size: 14px; font-weight: bold; display: block; margin-top: 8px; }

        /* สไตล์ตารางแสดงผลเดิม */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f1f5f9; color: #475569; }
        .btn-qr { background: #10b981; color: white; border: none; padding: 8px 14px; cursor: pointer; border-radius: 6px; }
        #qrcode-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 12px; display: none; text-align: center; box-shadow: 0 20px 25px rgba(0,0,0,0.1); z-index: 100; border: 1px solid #e2e8f0; }
        #blur-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 99; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>🔗 ระบบลิงก์สั้น & QR Code (Link.m-society)</h1>
        <p style="margin: 5px 0 0 0; color: #64748b;">บริการสร้างและจัดการลิงก์สั้นภายในหน่วยงาน</p>
    </div>

    <div class="form-container">
        <h3 style="margin: 0; color: #1e3a8a;">➕ สร้างลิงก์สั้นใหม่</h3>
        <div class="form-group">
            <input type="text" id="inputShort" placeholder="ชื่อลิงก์สั้น เช่น msdhs" style="flex: 2;">
            <input type="url" id="inputLong" placeholder="วางลิงก์ยาวปลายทาง (https://...)" style="flex: 5;">
            <button id="btnSubmit" onclick="submitToData()" class="btn-submit">บันทึกข้อมูล</button>
        </div>
        <span id="statusMsg"></span>
    </div>

    <table id="linksTable">
        <thead>
            <tr>
                <th>ลิงก์สั้น (Short URL)</th>
                <th>ลิงก์ปลายทาง (Long URL)</th>
                <th>เครื่องมือ</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <div id="blur-overlay" onclick="closeQR()"></div>
    <div id="qrcode-box">
        <h3 style="margin-top:0;">📱 QR Code สำเร็จรูป</h3>
        <div id="qrcode" style="display: flex; justify-content: center; margin: 20px 0;"></div>
        <p id="qr-text" style="font-weight: bold; color: #2563eb; word-break: break-all;"></p>
        <button onclick="closeQR()" style="background: #64748b; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer;">ปิดหน้าต่าง</button>
    </div>

    <script>
        const currentDomain = window.location.origin + '/Link.m-society';
        const sheetId = '1Y1-OxdGd21LW2hjIJU79FGHr-ga7ynQ9hU3P1qxK4x0';
        
        // 🛠️ แก้ไข: วาง URL ของ Google Web App API ที่ได้จากหลังบ้านตรงนี้ 🛠️
        const webAppUrl = 'https://script.google.com/macros/s/AKfycbwBJAD1icj4KkXQZIZZfr2nrdSvEZDr-lpOOQaQRZ659HnQKuD_RKR4qKiZsb62guf-iw/exec';

        // URL ดึงข้อมูลมาโชว์ในตาราง (แก้เป็น "การตอบกลับฟอร์ม 1" เรียบร้อยแล้ว)
        const jsonUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent('การตอบกลับฟอร์ม 1')}`;
        
        let existingSlugs = []; // ตัวแปรเก็บชื่อลิงก์สั้นที่มีอยู่แล้วเพื่อเอาไว้เช็กซ้ำ

        // 1. ดึงข้อมูลจาก Sheet มาแสดงผลบนตารางตามโครงสร้างเดิม
        fetch(jsonUrl)
            .then(res => res.text())
            .then(text => {
                const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const jsonData = JSON.parse(jsonString);
                const rows = jsonData.table.rows;
                const tbody = document.querySelector('#linksTable tbody');
                
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (row.c && row.c[1] && row.c[2]) {
                        const shortVal = row.c[1] ? (row.c[1].v !== null ? row.c[1].v : '') : '';
                        const longVal = row.c[2] ? (row.c[2].v !== null ? row.c[2].v : '') : '';
                        
                        const slug = shortVal.toString().trim();
                        const longUrl = longVal.toString().trim();
                        const shortUrl = `${currentDomain}/${slug}`;

                        if(slug && longUrl) {
                            existingSlugs.push(slug.toLowerCase()); // บันทึกเข้าลิสต์เช็กซ้ำ
                            
                            const rowHtml = `<tr>
                                <td><a href="${shortUrl}" target="_blank" style="color: #2563eb; font-weight:bold; text-decoration:none;">/${slug}</a></td>
                                <td style="max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #64748b;">${longUrl}</td>
                                <td>
                                    <button class="btn-qr" onclick="generateQR('${shortUrl}')">สร้าง QR Code</button>
                                </td>
                            </tr>`;
                            tbody.innerHTML += rowHtml;
                        }
                    }
                }
            })
            .catch(err => console.error("Error loading table data:", err));

        // 2. ⚡ ระบบเช็กซ้ำแบบเรียลไทม์ขณะที่ User พิมพ์ชื่อลิงก์สั้น
        document.getElementById('inputShort').addEventListener('input', function() {
            const val = this.value.trim().toLowerCase();
            const msg = document.getElementById('statusMsg');
            const btn = document.getElementById('btnSubmit');

            if (!val) {
                msg.innerText = "";
                btn.disabled = false;
                return;
            }

            if (existingSlugs.includes(val)) {
                msg.innerText = "❌ ชื่อลิงก์สั้นนี้ถูกใช้งานไปแล้ว กรุณาตั้งชื่ออื่น";
                msg.style.color = "#ef4444";
                btn.disabled = true; // ล็อกปุ่มบันทึกทันที
            } else {
                msg.innerText = "✅ ชื่อนี้ว่างอยู่ สามารถใช้งานได้";
                msg.style.color = "#10b981";
                btn.disabled = false; // ปลดล็อกปุ่ม
            }
        });

        function submitToData() {
            const shortUrl = document.getElementById('inputShort').value.trim();
            const longUrl = document.getElementById('inputLong').value.trim();
            const msg = document.getElementById('statusMsg');
            const btn = document.getElementById('btnSubmit');
        
            if (!shortUrl || !longUrl) {
                alert('กรุณากรอกข้อมูลให้ครบถ้วนก่อนบันทึกครับ');
                return;
            }
        
            btn.innerText = "⏳ กำลังบันทึกข้อมูล...";
            btn.disabled = true;
        
            // สร้าง Form ชั่วคราวส่งข้อมูลแบบเบสิก เพื่อการันตีการเข้าถึงหลังบ้าน Google 100%
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = webAppUrl;
            form.target = 'hidden_iframe'; // ยิงข้อมูลผ่านหน้าต่างล่องหน ไม่ให้หน้าเว็บจริงกระตุก
        
            const input1 = document.createElement('input');
            input1.name = 'shortUrl';
            input1.value = shortUrl;
            form.appendChild(input1);
        
            const input2 = document.createElement('input');
            input2.name = 'longUrl';
            input2.value = longUrl;
            form.appendChild(input2);
        
            // สร้าง iframe ล่องหนไว้รองรับผลลัพธ์
            let iframe = document.getElementById('hidden_iframe');
            if (!iframe) {
                iframe = document.createElement('iframe');
                iframe.id = 'hidden_iframe';
                iframe.name = 'hidden_iframe';
                iframe.style.display = 'none';
                document.body.appendChild(iframe);
            }
        
            document.body.appendChild(form);
            form.submit(); // สั่งส่งข้อมูลทันที
        
            // แสดงสถานะความสำเร็จและสั่งรีเฟรชหน้าเว็บ
            msg.innerText = "🎉 ส่งข้อมูลสำเร็จ! กำลังซิงค์ตารางฐานข้อมูล...";
            msg.style.color = "#10b981";
            
            setTimeout(() => { 
                document.body.removeChild(form);
                location.reload(); 
            }, 2500); // หน่วงเวลาให้ Google บันทึกอย่างเนียนๆ 2.5 วินาที
        }
        
        // --- ฟังก์ชันเครื่องมือ QR Code อันเดิม ---
        let qrElement = new QRCode(document.getElementById("qrcode"), { width: 200, height: 200 });
        function generateQR(url) {
            qrElement.clear();
            qrElement.makeCode(url);
            document.getElementById('qr-text').innerText = url;
            document.getElementById('qrcode-box').style.display = 'block';
            document.getElementById('blur-overlay').style.display = 'block';
        }
        function closeQR() {
            document.getElementById('qrcode-box').style.display = 'none';
            document.getElementById('blur-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
