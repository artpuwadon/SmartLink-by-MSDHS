<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กำลังเปลี่ยนเส้นทาง...</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 100px; background-color: #f4f6f9; color: #333; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2 id="msg">กำลังตรวจสอบลิงก์สั้น...</h2>

    <script>
        // 1. แกะค่าชื่อลิงก์สั้น (Slug) โดยรองรับโฟลเดอร์ Link.m-society
        let path = window.location.pathname;
        const repoName = '/Link.m-society/';
        if (path.startsWith(repoName)) {
            path = path.substring(repoName.length);
        }
        path = path.replace(/^\/|\/$/g, '').trim().toLowerCase();

        // 🛠️ แก้ไข SPREADSHEET ID ของคุณตรงนี้ 🛠️
        const sheetId = 'https://docs.google.com/spreadsheets/d/1Y1-OxdGd21LW2hjIJU79FGHr-ga7ynQ9hU3P1qxK4x0'; 
        
        // ใช้ URL รูปแบบ gviz/tq เพื่อดึงข้อมูลเป็น JSON แทน CSV (แม่นยำกว่า 100%)
        const jsonUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

        if (path) {
            fetch(jsonUrl)
                .then(response => response.text())
                .then(text => {
                    // ตัดข้อความส่วนเกินที่ Google พ่วงมาเพื่อให้เหลือแค่ JSON ที่ถูกต้อง
                    const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                    const jsonData = JSON.parse(jsonString);
                    const rows = jsonData.table.rows;
                    
                    const links = {};
                    
                    rows.forEach(row => {
                        // เช็กว่าแถวมีข้อมูลครบตามฟอร์มหรือไม่ (ปกติ Col B คือช่องสั้น, Col C คือช่องยาว)
                        if (row.c && row.c[1] && row.c[2]) {
                            const shortUrl = row.c[1].v.toString().trim().toLowerCase();
                            const longUrl = row.c[2].v.toString().trim();
                            if (shortUrl && longUrl) {
                                links[shortUrl] = longUrl;
                            }
                        }
                    });

                    // 2. ตรวจสอบและนำทาง
                    if (links[path]) {
                        document.getElementById('msg').innerText = "กำลังนำท่านไปยังปลายทาง...";
                        window.location.href = links[path];
                    } else {
                        document.getElementById('msg').innerText = "❌ ไม่พบลิงก์สั้นนี้ในระบบ หรือพิมพ์ผิด";
                        document.querySelector('.loader').style.display = 'none';
                    }
                })
                .catch(error => {
                    document.getElementById('msg').innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล";
                    console.error(error);
                });
        } else {
            // ถ้าเข้าหน้าแรกเฉยๆ ให้วิ่งไป index.html
            window.location.href = repoName;
        }
    </script>
</body>
</html>
